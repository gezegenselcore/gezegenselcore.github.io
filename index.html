<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gezegensel Core</title>
  <script>
    (function () {
      var n = (navigator.languages && navigator.languages[0]) || navigator.language || "";
      n = String(n).toLowerCase();
      var tr = n === "tr" || n.indexOf("tr-") === 0;
      var h = typeof location !== "undefined" && location.hash ? location.hash : "";
      var base = tr ? "tr/" : "en/";
      if (typeof location !== "undefined" && location.replace) {
        location.replace(base + h);
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=en/">
  <noscript>
    <p style="font-family: system-ui, sans-serif; padding: 1.5rem; text-align: center;">
      <a href="en/">English</a> · <a href="tr/">Türkçe</a>
    </p>
  </noscript>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1.5rem; text-align: center; line-height: 1.6;">
    <a href="tr/">Türkçe</a>
    ·
    <a href="en/">English</a>
  </p>
</body>
</html>
